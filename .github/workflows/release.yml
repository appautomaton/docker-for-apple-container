name: Release to PyPI

# Publishes to PyPI via trusted publishing (OIDC, no token).
# Fires when a GitHub release is published, and can be run manually
# (workflow_dispatch) to publish the current main, e.g. for the first release.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pypi-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/docker-for-apple-container
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # hatch-vcs derives the version from the release tag
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
